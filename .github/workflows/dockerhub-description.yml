name: Docker Hub Description

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - ".github/workflows/dockerhub-description.yml"
  pull_request:
    branches:
      - main
    paths:
      - "README.md"
      - ".github/workflows/dockerhub-description.yml"
  workflow_dispatch:

jobs:
  update-description:
    name: Update Docker Hub Description
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: README.md

      - name: Check image exists on Docker Hub
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/flutter-devcontainer/)
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Docker Hub description
        if: steps.check.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/flutter-devcontainer
          readme-filepath: ./README.md

      - name: Write job summary
        if: always()
        run: |
          echo "## 📄 Docker Hub Description Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | \`${{ github.event_name }}\` on \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image exists** | \`${{ steps.check.outputs.exists }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Docker Hub updated** | \`${{ steps.check.outputs.exists == 'true' && github.event_name != 'pull_request' }}\` |" >> $GITHUB_STEP_SUMMARY